#
# docker-compose.yml — appointment_system
#
# All environment variables are defined inline here — no .env file required.
# Run with:
#   docker compose up --build
#

services:


  # PostgreSQL

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appointment_db"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s


  # Redis
  
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Django — runs migrations on startup, then serves via gunicorn
 
  web:
    build: .
    restart: unless-stopped
    command: gunicorn appointment_system.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120
    volumes:
      - .:/app
      - logs_data:/app/logs
    ports:
      - "8000:8000"
    environment:
      # Django
      SECRET_KEY: django-insecure-change-this-in-production
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      DJANGO_SETTINGS_MODULE: appointment_system.settings
      # Database
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: appointment_db
      DB_USER: devuser
      DB_PASSWORD: devpass
      DB_HOST: db
      DB_PORT: "5432"
      # Redis / Celery
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      # Entrypoint control
      RUN_MIGRATIONS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker — processes async tasks

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A appointment_system worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - logs_data:/app/logs
    environment:
      SECRET_KEY: django-insecure-change-this-in-production
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: appointment_system.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: appointment_db
      DB_USER: devuser
      DB_PASSWORD: devpass
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  # Celery Beat — runs scheduled tasks (6-hour sync)
  # WARNING: never scale this service beyond 1 replica

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A appointment_system beat --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
      - logs_data:/app/logs
    environment:
      SECRET_KEY: django-insecure-change-this-in-production
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: appointment_system.settings
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: appointment_db
      DB_USER: devuser
      DB_PASSWORD: devpass
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      RUN_MIGRATIONS: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


# Volumes

volumes:
  postgres_data:
  redis_data:
  logs_data: